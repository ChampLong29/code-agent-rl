# grpo.yaml — Phase 2c: GRPO 配置（Search-R1 核心）

_base_: base.yaml

grpo:
  # 输入：SFT 冷启动后的合并模型
  model_path:  "checkpoints/sft_merged"
  output_dir:  "checkpoints/grpo"

  # 采样
  group_size:              8     # G：每个 prompt 采样多少条轨迹
  max_steps_per_episode:   15
  rollout_temperature:     0.8
  rollout_workers:         2     # 并发 rollout 线程数

  # 训练
  num_iterations:          200
  prompts_per_batch:       4
  learning_rate:           5.0e-6
  gradient_accumulation_steps: 4

  # GRPO 特有参数（来自 Search-R1 / DeepSeek-R1）
  kl_coeff:    0.04    # β：KL 散度惩罚（Search-R1 用 0.04）
  clip_epsilon: 0.2    # ε：PPO clip 范围

  max_grad_norm: 1.0
  save_steps:    20

  # 训练模式
  mode: "custom"  # "custom" | "trl" | "slime"

  # vLLM（slime/trl 模式使用）
  gpu_memory_utilization: 0.7
